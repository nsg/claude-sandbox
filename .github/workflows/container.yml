name: Build and publish container image

on:
  push:
    branches: ['master']
    paths:
      - Containerfile
      - config/**
      - .github/workflows/container.yml
  schedule:
    # Run twice a week to keep the image fresh (Tuesday and Friday at 18:00 UTC)
    - cron: '0 18 * * 2,5'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate-agents-overlays:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check AGENTS.md has exactly one H1 on the first line
        run: |
          # The entrypoint uses the base file's first line as the managed
          # section marker and replaces everything up to the next H1. A
          # second H1 in the base would end up outside the managed section
          # and get duplicated on every container start.
          awk '
            /^```/ { fence = !fence; next }
            fence { next }
            /^# / { if (FNR != 1) {
              printf "::error file=%s,line=%d::extra H1 heading (only line 1 may be an H1): %s\n", FILENAME, FNR, $0
              bad = 1
            } }
            FNR == 1 && $0 !~ /^# / {
              printf "::error file=%s,line=1::first line must be an H1 heading\n", FILENAME
              bad = 1
            }
            END { exit bad }
          ' config/AGENTS.md

      - name: Check AGENTS overlays contain no H1 headings
        run: |
          # Overlay content is appended inside the managed H1 section of the
          # shared config/AGENTS.md; an H1 in an overlay would end that
          # section and leak into user-owned content. Fenced code blocks
          # are skipped so shell comments in examples don't false-positive.
          status=0
          for f in config/AGENTS.*.md; do
            [ -e "$f" ] || continue
            if ! awk '
              /^```/ { fence = !fence; next }
              !fence && /^# / {
                printf "::error file=%s,line=%d::H1 heading in overlay (use ## sections only): %s\n", FILENAME, FNR, $0
                bad = 1
              }
              END { exit bad }
            ' "$f"; then
              status=1
            fi
          done
          exit "$status"

  build-and-push-image:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: validate-agents-overlays
    permissions:
      packages: write

    steps:
      - name: Grow swap for the image export
        run: |
          # The layer-export phase kills the job abruptly on stock
          # runners: no error, logs cut off mid-export, while disk has
          # 100+ GB free — the runner OOMs. The stock 4 GB /swapfile is
          # not enough; add another 16 GB.
          sudo fallocate -l 16G /swapfile2
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2
          free -h
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: "${{ steps.meta.outputs.tags }}"
          labels: "${{ steps.meta.outputs.labels }}"
